<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Cleaning — Interactive Session Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary:       #0062a8;
      --primary-dark:  #004d84;
      --primary-light: #e8f3fc;
      --navy:          #333f70;
      --bg:            #f4f7fb;
      --surface:       #ffffff;
      --border:        #dde3ef;
      --text:          #1e2a4a;
      --muted:         #64748b;
      --faint:         #94a3b8;
      --keep:          #059669;
      --keep-bg:       #ecfdf5;
      --keep-bd:       #a7f3d0;
      --drop:          #dc2626;
      --drop-bg:       #fef2f2;
      --drop-bd:       #fecaca;
      --warn:          #b45309;
      --warn-bg:       #fffbeb;
      --warn-bd:       #fde68a;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 17px; }
    h1,h2,h3,h4 { font-family: 'Sora', sans-serif; }

    /* ── HEADER ─────────────────────────────────── */
    header {
      background: var(--navy);
      min-height: 64px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 10px rgba(51,63,112,.2);
      flex-wrap: wrap;
    }
    .logo {
      font-family: 'Sora', sans-serif;
      font-weight: 800;
      font-size: 16px;
      letter-spacing: .05em;
      color: #fff;
      cursor: pointer;
      padding: 5px 10px;
      border-radius: 6px;
      margin-right: 10px;
      transition: background .15s;
    }
    .logo:hover { background: rgba(255,255,255,.08); }
    .logo span  { color: #7ec8f0; }
    .nav-div    { width: 1px; height: 20px; background: rgba(255,255,255,.12); margin: 0 6px; }
    .nav-btn {
      padding: 10px 14px;
      background: transparent;
      border: none;
      border-radius: 6px;
      color: rgba(255,255,255,.6);
      cursor: pointer;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all .15s;
      white-space: nowrap;
    }
    .nav-btn:hover  { background: rgba(255,255,255,.08); color: #fff; }
    .nav-btn.active { background: rgba(255,255,255,.16); color: #fff; }
    .nav-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* ── HOME HERO ──────────────────────────────── */
    .hero {
      background: linear-gradient(135deg, var(--navy) 0%, var(--primary) 60%, #0086d4 100%);
      color: #fff;
      padding: 56px 48px 52px;
      position: relative;
      overflow: hidden;
    }
    .hero::after  { content:''; position:absolute; top:-40px; right:-40px; width:280px; height:280px; background:rgba(255,255,255,.04); border-radius:50%; }
    .hero::before { content:''; position:absolute; bottom:-60px; right:100px; width:160px; height:160px; background:rgba(255,255,255,.03); border-radius:50%; }
    .hero-eyebrow { font-size:13px; font-weight:600; letter-spacing:.18em; text-transform:uppercase; color:rgba(255,255,255,.5); margin-bottom:14px; }
    .hero-title   { font-size:46px; font-weight:800; line-height:1.15; margin-bottom:18px; position:relative; }
    .hero-title em { font-style:normal; color:#7ec8f0; }
    .hero-desc    { font-size:18px; line-height:1.75; max-width:600px; color:rgba(255,255,255,.82); position:relative; }

    /* ── HOME BODY ──────────────────────────────── */
    .home-body    { padding: 48px 32px 56px; max-width: 1120px; margin: 0 auto; width: 100%; }
    .eyebrow { font-size:12px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--primary); margin-bottom:10px; }
    .why-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px 32px;
      margin-bottom: 36px;
    }
    .why-card h2  { font-size:22px; font-weight:700; color:var(--navy); margin-bottom:12px; }
    .why-card p   { font-size:17px; color:var(--muted); line-height:1.75; margin-bottom:10px; }
    .why-card p:last-child { margin-bottom:0; }

    .steps-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:20px; align-items:stretch; }
    .step-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      cursor: pointer;
      transition: all .2s;
      position: relative;
      overflow: hidden;
    }
    .step-card:hover { border-color:var(--primary); box-shadow:0 6px 20px rgba(0,98,168,.1); transform:translateY(-2px); }
    .step-card .bar  { position:absolute; top:0; left:0; right:0; height:3px; border-radius:14px 14px 0 0; }
    .step-num-label  { font-size:12px; font-weight:700; letter-spacing:.12em; color:var(--faint); margin-bottom:12px; }
    .step-emoji      { font-size:32px; display:block; margin-bottom:11px; }
    .step-title      { font-family:'Sora',sans-serif; font-size:18px; font-weight:700; color:var(--navy); margin-bottom:6px; }
    .step-desc-text  { font-size:15px; color:var(--muted); line-height:1.5; }
    .step-link       { display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:600; color:var(--primary); margin-top:14px; opacity:0; transition:opacity .2s; }
    .step-card:hover .step-link { opacity:1; }

    /* ── SECTION PAGE ───────────────────────────── */
    .sec-page { max-width: 1040px; margin: 0 auto; padding: 40px 44px; }
    .sec-header { display:flex; align-items:flex-start; gap:14px; margin-bottom:24px; padding-bottom:22px; border-bottom:1px solid var(--border); }
    .sec-badge  { width:48px; height:48px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
    .sec-title  { font-size:28px; font-weight:800; color:var(--navy); line-height:1.2; }
    .sec-sub    { font-size:18px; color:var(--muted); margin-top:6px; line-height:1.6; }

    /* ── TABS ───────────────────────────────────── */
    .tabs     { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:28px; border-bottom:2px solid var(--border); }
    .tab-btn  { padding:12px 18px; background:transparent; border:none; border-bottom:2px solid transparent; color:var(--muted); cursor:pointer; font-size:15px; font-family:'DM Sans',sans-serif; font-weight:700; letter-spacing:.08em; text-transform:uppercase; transition:all .15s; margin-bottom:-2px; }
    .tab-btn:hover { color:var(--navy); }

    /* ── OVERVIEW ───────────────────────────────── */
    .ov-intro { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:22px 26px; margin-bottom:20px; }
    .ov-intro p { font-size:17px; color:var(--text); line-height:1.8; }
    .ov-2col    { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px; }
    .ov-box     { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px 22px; }
    .ov-box.identify { border-top:3px solid var(--primary); }
    .ov-box.treat    { border-top:3px solid var(--keep); }
    .ov-box-title    { font-size:14px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; margin-bottom:16px; }
    .identify .ov-box-title { color:var(--primary); }
    .treat    .ov-box-title { color:var(--keep); }
    .ov-item  { display:flex; gap:9px; margin-bottom:10px; align-items:flex-start; }
    .ov-dot   { width:5px; height:5px; border-radius:50%; margin-top:7px; flex-shrink:0; }
    .identify .ov-dot { background:var(--primary); }
    .treat    .ov-dot { background:var(--keep); }
    .ov-text  { font-size:16px; color:var(--text); line-height:1.7; }
    .ov-text code {
      font-family:'JetBrains Mono',monospace;
      font-size:13px;
      background:var(--primary-light);
      color:var(--primary);
      padding:2px 6px;
      border-radius:3px;
      border:1px solid #bfdbfe;
      display:inline-block;
      margin-top:4px;
    }
    .ov-bold { font-weight:600; color:var(--navy); }
    .ov-cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(148px,1fr)); gap:10px; margin-bottom:20px; }
    .ov-card  { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px; transition:border-color .15s; }
    .ov-card:hover { border-color:var(--primary); }
    .ov-card-emoji { font-size:20px; margin-bottom:7px; }
    .ov-card-title { font-size:14px; font-weight:700; color:var(--navy); margin-bottom:6px; text-transform:uppercase; letter-spacing:.05em; }
    .ov-card-desc  { font-size:15px; color:var(--muted); line-height:1.6; }
    .rule-box { background:var(--primary-light); border:1px solid #bfdbfe; border-left:4px solid var(--primary); border-radius:8px; padding:14px 18px; display:flex; align-items:flex-start; gap:10px; }
    .rule-label { font-size:12px; font-weight:700; letter-spacing:.12em; color:var(--primary); white-space:nowrap; padding-top:2px; text-transform:uppercase; }
    .rule-text  { font-size:16px; color:var(--navy); line-height:1.7; }

    /* ── DECISION TREE ──────────────────────────── */
    .tree-wrap { max-width:580px; }
    .tree-bc   { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; min-height:24px; }
    .tree-crumb { font-size:13px; background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:5px 12px; color:var(--muted); }
    .c-yes { color:var(--keep); font-weight:600; }
    .c-no  { color:var(--drop); font-weight:600; }
    .tree-card { background:var(--surface); border:1.5px solid var(--border); border-radius:14px; padding:28px; margin-bottom:14px; transition:border-color .25s,background .25s; }
    .tree-card.r-keep   { border-color:var(--keep-bd); background:var(--keep-bg); }
    .tree-card.r-drop   { border-color:var(--drop-bd); background:var(--drop-bg); }
    .tree-card.r-warn   { border-color:var(--warn-bd); background:var(--warn-bg); }
    .tree-card.r-danger { border-color:var(--drop-bd); background:var(--drop-bg); }
    .tree-step { font-size:12px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--faint); margin-bottom:10px; }
    .tree-q    { font-family:'Sora',sans-serif; font-size:22px; font-weight:700; color:var(--navy); line-height:1.5; margin-bottom:10px; }
    .tree-hint { font-size:15px; color:var(--muted); font-style:italic; margin-bottom:24px; padding:10px 14px; background:var(--bg); border-radius:6px; border-left:2px solid var(--border); line-height:1.7; }
    .tree-btns { display:flex; gap:10px; }
    .tree-btn  { flex:1; padding:14px; border-radius:9px; border:1.5px solid; font-size:16px; font-family:'DM Sans',sans-serif; font-weight:700; cursor:pointer; transition:all .15s; }
    .tree-btn.yes { background:var(--keep-bg); border-color:var(--keep-bd); color:var(--keep); }
    .tree-btn.yes:hover { background:#d1fae5; }
    .tree-btn.no  { background:var(--surface); border-color:var(--border); color:var(--text); }
    .tree-btn.no:hover  { background:var(--bg); }
    .r-label  { font-size:12px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--faint); margin-bottom:10px; }
    .r-title  { font-family:'Sora',sans-serif; font-size:28px; font-weight:800; margin-bottom:14px; }
    .r-keep   .r-title { color:var(--keep); }
    .r-drop   .r-title, .r-danger .r-title { color:var(--drop); }
    .r-warn   .r-title { color:var(--warn); }
    .r-msg    { font-size:17px; color:var(--muted); line-height:1.8; margin-bottom:16px; }
    .v-pill   { display:inline-block; padding:6px 14px; border-radius:20px; font-size:13px; font-weight:700; letter-spacing:.07em; }
    .vp-keep   { background:#d1fae5; color:#065f46; }
    .vp-drop   { background:#fee2e2; color:#991b1b; }
    .vp-warn   { background:#fef3c7; color:#92400e; }
    .vp-danger { background:#fee2e2; color:#991b1b; }
    .tree-ctrls { display:flex; gap:8px; }
    .ctrl-btn { padding:9px 16px; background:var(--surface); border:1px solid var(--border); border-radius:7px; color:var(--muted); cursor:pointer; font-size:14px; font-family:'DM Sans',sans-serif; font-weight:500; transition:all .15s; }
    .ctrl-btn:hover { border-color:var(--primary); color:var(--primary); }

    /* ── COMPARE ────────────────────────────────── */
    .cmp-title { font-size:14px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:18px; }
    .cmp-table { display:grid; gap:8px; }
    .cmp-header { display:grid; gap:12px; padding:6px 16px; }
    .cmp-head { font-size:12px; font-weight:700; letter-spacing:.1em; color:var(--faint); text-transform:uppercase; }
    .cmp-row { display:grid; gap:12px; padding:13px 16px; background:var(--surface); border:1px solid var(--border); border-radius:9px; align-items:center; transition:border-color .15s; }
    .cmp-row:hover { border-color:#bfdbfe; }
    .cmp-tech   { font-size:15px; font-weight:700; color:var(--navy); line-height:1.5; }
    .cmp-when   { font-size:15px; color:var(--text); line-height:1.6; }
    .cmp-risk   { font-size:15px; color:var(--muted); font-style:italic; line-height:1.6; }
    .cmp-verd   { font-size:12px; font-weight:700; padding:5px 10px; border-radius:20px; text-align:center; white-space:nowrap; }
    .cv-keep   { background:#d1fae5; color:#065f46; }
    .cv-drop   { background:#fee2e2; color:#991b1b; }
    .cv-warn   { background:#fef3c7; color:#92400e; }
    .cv-danger { background:#fee2e2; color:#991b1b; }

    /* ── QUIZ ───────────────────────────────────── */
    .quiz-wrap  { max-width:640px; }
    .q-card     { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:22px 24px; margin-bottom:14px; }
    .q-num      { font-size:12px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--faint); margin-bottom:10px; }
    .q-text     { font-family:'Sora',sans-serif; font-size:20px; font-weight:600; color:var(--navy); line-height:1.65; margin-bottom:16px; }
    .q-options  { display:flex; flex-direction:column; gap:7px; }
    .q-opt      { display:flex; align-items:center; gap:10px; padding:12px 16px; border-radius:8px; font-size:16px; font-family:'DM Sans',sans-serif; cursor:pointer; border:1.5px solid var(--border); background:var(--bg); color:var(--text); transition:all .15s; text-align:left; width:100%; line-height:1.6; }
    .q-opt:hover:not(:disabled) { border-color:var(--primary); background:var(--primary-light); }
    .q-opt.selected { border-color:var(--primary); background:var(--primary-light); color:var(--primary); }
    .q-opt.correct  { border-color:var(--keep-bd); background:var(--keep-bg); color:var(--keep); }
    .q-opt.wrong    { border-color:var(--drop-bd); background:var(--drop-bg); color:var(--drop); }
    .q-opt:disabled { cursor:default; }
    .q-marker   { font-size:14px; flex-shrink:0; width:18px; }
    .q-explain  { margin-top:12px; padding:14px 16px; background:var(--primary-light); border-radius:7px; border-left:3px solid var(--primary); font-size:15px; color:var(--navy); line-height:1.7; }
    .q-explain::before { content:'💡  '; }
    .submit-btn { padding:13px 30px; background:var(--primary); border:none; border-radius:9px; color:#fff; font-weight:700; font-size:16px; font-family:'DM Sans',sans-serif; cursor:pointer; transition:background .15s; }
    .submit-btn:hover   { background:var(--primary-dark); }
    .submit-btn:disabled { background:#cbd5e1; cursor:not-allowed; }
    .score-row  { display:flex; align-items:center; gap:14px; }
    .score-num  { font-family:'Sora',sans-serif; font-size:28px; font-weight:800; color:var(--navy); }
    .score-sub  { font-size:16px; color:var(--muted); }
    .retry-btn  { padding:10px 20px; background:var(--surface); border:1.5px solid var(--primary); border-radius:7px; color:var(--primary); cursor:pointer; font-size:14px; font-family:'DM Sans',sans-serif; font-weight:700; transition:all .15s; }
    .retry-btn:hover { background:var(--primary-light); }

    /* ── UTILS ──────────────────────────────────── */
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .fade-in { animation:fadeIn .25s ease forwards; }
    #main-nav { display:flex; align-items:center; gap:8px; flex-wrap:wrap; flex:1; }
    @media(min-width:1200px) {
      .hero, .sec-page { max-width: 1200px; margin: 0 auto; }
    }
    @media(max-width:680px) {
      header { padding: 12px 16px; }
      .nav-div { display:none; }
      #main-nav { width:100%; }
      .ov-2col { grid-template-columns:1fr; }
      .steps-grid { grid-template-columns:1fr; }
      .hero { padding:36px 20px; }
      .hero-title { font-size:32px; }
      .hero-desc { font-size:16px; }
      .home-body, .sec-page { padding:20px; }
    }
  </style>
</head>
<body>

<header>
  <img src="logo.png" alt="HCL-GUVI Logo"
         style="height:40px; object-fit:contain;">
  <div class="logo" onclick="navigate('home')">Data <span>Cleaning</span></div>
  <div class="nav-div"></div>
  <nav id="main-nav"></nav>
</header>
<div id="app"></div>

<script>
// ════════════════════════════════════════════════════════
//  SECTION METADATA
// ════════════════════════════════════════════════════════
const SECTIONS = [
  { id:'drop',       title:'Drop Columns',   emoji:'⊘', accent:'#f59e0b', accentBg:'#fffbeb', sub:'Remove columns that add noise rather than signal' },
  { id:'duplicates', title:'Duplicates',     emoji:'⧉', accent:'#059669', accentBg:'#ecfdf5', sub:'Identify and resolve repeated records correctly' },
  { id:'missing',    title:'Missing Values', emoji:'?', accent:'#0062a8', accentBg:'#e8f3fc', sub:'Understand why values are missing before filling them' },
  { id:'outliers',   title:'Outliers',       emoji:'◈', accent:'#7c3aed', accentBg:'#f5f3ff', sub:'Decide whether extreme values are errors or signals' },
];

// ════════════════════════════════════════════════════════
//  OVERVIEW DATA
// ════════════════════════════════════════════════════════
const OVERVIEW = {
  drop: {
    intro: 'Not every column deserves to be in your model. Some add pure noise, some carry the risk of leaking your target variable, and some are simply too broken to trust. Identifying and removing these columns early makes your entire pipeline cleaner, faster, and more reliable.',
    identify: [
      { text:'Check missing % per column', code:'df.isnull().mean() * 100' },
      { text:'Check variance and unique count', code:'df.nunique()  |  df.var()' },
      { text:'Check correlation with target', code:"df.corr()['target'].abs().sort_values()" },
      { text:'Flag high-cardinality columns', code:'df.nunique().sort_values(ascending=False)' },
      { text:'Domain review: Was this column available before the target was known? (leakage check)' },
    ],
    treat: [
      { label:'Missing > 70%',            action:'Drop — imputing would mean fabricating most of the data' },
      { label:'Near-zero variance',        action:'Drop — model has nothing to learn from it' },
      { label:'Irrelevant to the problem', action:'Drop — reduces noise and training time' },
      { label:'High-cardinality raw ID',   action:'Frequency/target encode, or Drop if it\'s just an identifier' },
      { label:'Target-derived column',     action:'Drop immediately — this causes data leakage in production' },
      { label:'High multicollinearity',    action:'Drop one column from the correlated pair' },
    ],
    cards: [
      { emoji:'📉', title:'Too Many Missing',   desc:'>70% null → unreliable to impute' },
      { emoji:'🎯', title:'Irrelevant Feature', desc:'No signal for the target variable' },
      { emoji:'📌', title:'Zero Variance',      desc:'All same value → nothing to learn' },
      { emoji:'🔗', title:'Multicollinearity',  desc:'Duplicate signal → hurts linear models' },
      { emoji:'🚨', title:'Target Leakage',     desc:'Derived from label → data leakage' },
      { emoji:'🆔', title:'Raw ID Column',      desc:'Thousands of unique values → encode or drop' },
    ],
    rule: 'Before dropping anything — ask if the column has signal, not just if it has problems.',
  },
  duplicates: {
    intro: 'Duplicate rows can silently inflate your counts, bias your model, and distort statistics — but not all repeated rows are errors. A customer making two purchases on the same day is real data. Understanding the type of duplication determines the right action.',
    identify: [
      { text:'Count exact duplicates (all fields match)', code:'df.duplicated().sum()' },
      { text:'Check key-field duplicates (same entity)', code:"df.duplicated(subset=['name','email']).sum()" },
      { text:'Spot casing/whitespace inconsistencies', code:"df['city'].value_counts()  →  Chennai / chennai" },
      { text:'Domain review: Can this entity legitimately appear multiple times in real life?' },
    ],
    treat: [
      { label:'Exact duplicates',     action:'Drop — df.drop_duplicates(). These are data entry errors.' },
      { label:'Format duplicates',    action:'Normalize first (str.lower().str.strip()), then deduplicate' },
      { label:'Partial duplicates',   action:'Investigate — reconcile by domain rules or merge records' },
      { label:'Business duplicates',  action:'Keep as-is — they represent real, valid repeated events' },
    ],
    cards: [
      { emoji:'🔁', title:'Exact Duplicate',    desc:'All fields match → likely data entry error' },
      { emoji:'✏️', title:'Format Duplicate',   desc:'Chennai vs chennai → normalize first' },
      { emoji:'🧩', title:'Partial Duplicate',  desc:'Same entity, minor diffs → investigate' },
      { emoji:'💼', title:'Business Duplicate', desc:'Real repeated event → valuable data' },
    ],
    rule: 'Define what a row represents before deciding whether repetition is an error or expected behavior.',
  },
  missing: {

function navigate(page) {
  S.page = page;
  render();
}
function setTab(id, tab) {
  S.tabs[id] = tab;
  updateSection(id);
}

// ════════════════════════════════════════════════════════
//  RENDER ENGINE
// ════════════════════════════════════════════════════════
function render() {
  renderNav();
  const app = document.getElementById('app');
  if (S.page === 'home') {
    app.innerHTML = buildHome();
  } else {
    app.innerHTML = `<div class="sec-page fade-in" id="sec-page"></div>`;
    updateSection(S.page);
  }
}

function renderNav() {
  const el = document.getElementById('main-nav');
  el.innerHTML = SECTIONS.map(s => {
    const active = S.page === s.id ? 'active' : '';
    return `<button class="nav-btn ${active}" onclick="navigate('${s.id}')">
      <span class="nav-dot" style="background:${s.accent}"></span>${s.title}
    </button>`;
  }).join('');
}

// ── HOME PAGE ────────────────────────────────────────────

  const cards = SECTIONS.map((s, i) => `
    <div class="step-card" onclick="navigate('${s.id}')">
      <div class="bar" style="background:${s.accent}"></div>
      <div class="step-num-label">SECTION ${String(i+1).padStart(2,'0')}</div>
      <span class="step-emoji">${s.emoji}</span>
      <div class="step-title">${s.title}</div>
      <div class="step-desc-text">${s.sub}</div>
      <div class="step-link">Explore →</div>
    </div>`).join('');

  return `
    <div class="hero fade-in">
      <div class="hero-eyebrow">Data Science · Session Guide</div>
      <h1 class="hero-title">Data <em>Cleaning</em><br>Interactive Guide</h1>
      <p class="hero-desc">Raw data is never perfect. Data cleaning is the process of identifying and correcting issues in your dataset so your models learn from signal — not noise, errors, or artifacts.</p>
    </div>
    <div class="home-body">
      <div class="why-card">
        <div class="eyebrow">What is Data Cleaning?</div>
        <h2>The most important step no one talks about enough</h2>
        <p>In real-world data science, 60–80% of the work happens before you train a single model. Raw data arrives with missing values, duplicate records, erroneous outliers, and columns that shouldn't be there at all.</p>
        <p>Data cleaning is systematic. For each type of issue, there is a decision framework that guides whether to remove, repair, or preserve — and the answer always depends on context: the data, the problem, and the model you plan to use.</p>
        <p>This guide covers the four most critical cleaning operations. Each section gives you how to identify the issue, how to treat it, an interactive decision tree, a technique comparison, and a scenario-based quiz.</p>

// ── SECTION PAGE ─────────────────────────────────────────
function updateSection(id) {
  const el = document.getElementById('sec-page');
  if (!el) return;
  const s     = SECTIONS.find(x => x.id === id);
  const tab   = S.tabs[id];
  const TMAP  = { overview:'Overview', 'decision-tree':'Decision Tree', compare:'Compare', quiz:'Quiz' };

  const tabBtns = Object.entries(TMAP).map(([k, label]) => {
    const style = tab === k ? `color:${s.accent};border-bottom-color:${s.accent};` : '';
    return `<button class="tab-btn" style="${style}" onclick="setTab('${id}','${k}')">${label}</button>`;
  }).join('');

  const content =
    tab === 'overview'      ? buildOverview(id) :
    tab === 'decision-tree' ? buildTree(id)     :
    tab === 'compare'       ? buildCompare(id)  :
                              buildQuiz(id);

  el.innerHTML = `
    <div class="sec-header">
      <div class="sec-badge" style="background:${s.accentBg}">${s.emoji}</div>
      <div>
        <div class="sec-title">${s.title}</div>
        <div class="sec-sub">${s.sub}</div>
      </div>
    </div>
    <div class="tabs">${tabBtns}</div>
    <div class="fade-in">${content}</div>`;
}

  const cards = d.cards.map(c => `
    <div class="ov-card">
      <div class="ov-card-emoji">${c.emoji}</div>
      <div class="ov-card-title">${c.title}</div>
      <div class="ov-card-desc">${c.desc}</div>

  return `

      <span class="rule-label">Key Rule</span>
      <span class="rule-text">${d.rule}</span>
    </div>`;
}

// ── DECISION TREE ─────────────────────────────────────────
function buildTree(id) {
  const ts   = S.trees[id];
  const node = TREES[id].nodes[ts.cur];

  const crumbs = ts.hist.map((h, i) =>
    `<span class="tree-crumb">Q${i+1}: <span class="${h.a==='Yes'?'c-yes':'c-no'}">${h.a}</span></span>`
  ).join('');

  let cls = '', body = '';
  if (!node.result) {
    body = `
      <div class="tree-step">STEP ${ts.hist.length + 1}</div>
      <div class="tree-q">${node.q}</div>
      <div class="tree-hint">💡 ${node.hint}</div>
      <div class="tree-btns">
        <button class="tree-btn yes" onclick="treeGo('${id}','${node.yes}','Yes')">✓  Yes</button>
        <button class="tree-btn no"  onclick="treeGo('${id}','${node.no}','No')">✗  No</button>
      </div>`;
  } else {
    cls = `r-${node.verdict}`;
    const pillClass = `vp-${node.verdict}`;
    const pillTxt   = node.verdict==='keep' ? 'KEEP' : node.verdict==='warn' ? 'REVIEW' : 'DROP';
    body = `
      <div class="r-label">RESULT</div>
      <div class="r-title">${node.title}</div>
      <div class="r-msg">${node.msg}</div>
      <span class="v-pill ${pillClass}">${pillTxt}</span>`;
  }

  const backBtn = ts.hist.length
    ? `<button class="ctrl-btn" onclick="treeBack('${id}')">← Back</button>` : '';

  return `
    <div class="tree-wrap">
      <div class="tree-bc">${crumbs}</div>
      <div class="tree-card ${cls}">${body}</div>
      <div class="tree-ctrls">
        ${backBtn}
        <button class="ctrl-btn" onclick="treeReset('${id}')">↺ Reset</button>
      </div>
    </div>`;
}

function treeGo(id, next, ans) {
  S.trees[id].hist.push({ n: S.trees[id].cur, a: ans });
  S.trees[id].cur = next;
  setTab(id, 'decision-tree');
}
function treeBack(id) {
  if (!S.trees[id].hist.length) return;
  S.trees[id].cur = S.trees[id].hist.pop().n;
  setTab(id, 'decision-tree');
}
function treeReset(id) {
  S.trees[id] = { cur: TREES[id].start, hist: [] };
  setTab(id, 'decision-tree');
}

// ── COMPARE ───────────────────────────────────────────────
function buildCompare(id) {
  const c = COMPARE[id];
  const heads = c.heads.map(h => `<div class="cmp-head">${h}</div>`).join('');
  const rows  = c.rows.map(r => `
    <div class="cmp-row" style="grid-template-columns:${c.cols}">
      <div class="cmp-tech">${r.t}</div>
      <div class="cmp-when">${r.w}</div>
      <div class="cmp-risk">${r.r}</div>
      <div class="cmp-verd cv-${r.vc}">${r.v}</div>
    </div>`).join('');

  return `
    <p class="cmp-title">Quick Reference — When to Use Each Approach</p>
    <div class="cmp-table">
      <div class="cmp-header" style="grid-template-columns:${c.cols}">${heads}</div>
      ${rows}
    </div>`;
}

// ── QUIZ ──────────────────────────────────────────────────
function buildQuiz(id) {
  const qs  = QUIZZES[id];
  const qst = S.quiz[id];
  const allDone = Object.keys(qst.ans).length === qs.length;

  const questions = qs.map((q, qi) => {
    const opts = q.opts.map((opt, oi) => {
      let cls = '';
      const sel = qst.ans[qi] === oi;
      if (qst.done) {
        if (oi === q.ans) cls = 'correct';
        else if (sel)     cls = 'wrong';
      } else if (sel) cls = 'selected';
      const mark = qst.done ? (oi===q.ans ? '✓' : sel ? '✗' : '○') : (sel ? '●' : '○');
      const dis  = qst.done ? 'disabled' : '';
      return `<button class="q-opt ${cls}" onclick="qSelect('${id}',${qi},${oi})" ${dis}>
        <span class="q-marker">${mark}</span>${opt}
      </button>`;
    }).join('');
    const expl = qst.done ? `<div class="q-explain">${q.exp}</div>` : '';
    return `
      <div class="q-card">
        <div class="q-num">QUESTION ${qi+1}</div>
        <div class="q-text">${q.q}</div>
        <div class="q-options">${opts}</div>
        ${expl}
      </div>`;
  }).join('');

  let actions = '';
  if (!qst.done) {
    actions = `<button class="submit-btn" onclick="qSubmit('${id}')" ${allDone?'':'disabled'}>Submit Answers</button>`;
  } else {
    const score = qs.filter((q,i) => qst.ans[i] === q.ans).length;
    actions = `<div class="score-row">
      <div class="score-num">${score}/${qs.length}</div>
      <div class="score-sub">correct</div>
      <button class="retry-btn" onclick="qRetry('${id}')">Try Again</button>
    </div>`;
  }

  return `<div class="quiz-wrap">${questions}<div style="margin-top:4px">${actions}</div></div>`;
}

function qSelect(id, qi, oi) {
  if (S.quiz[id].done) return;
  S.quiz[id].ans[qi] = oi;
  setTab(id, 'quiz');
}
function qSubmit(id) {
  S.quiz[id].done = true;
  setTab(id, 'quiz');
}
function qRetry(id) {
  S.quiz[id] = { ans:{}, done:false };
  setTab(id, 'quiz');
}

// ════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════
render();
</script>
