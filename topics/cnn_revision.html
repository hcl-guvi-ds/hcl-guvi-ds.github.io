<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CV Interview Prep</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a16;color:#e2e8f0;font-family:'Segoe UI',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#1a1a2e}::-webkit-scrollbar-thumb{background:#667eea;border-radius:3px}
#nav{background:linear-gradient(90deg,#1a1a2e,#16213e);border-bottom:1px solid #2d3748;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100}
#nav .logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px}
#back-btn{background:#2d3748;border:none;color:#e2e8f0;padding:6px 12px;border-radius:7px;cursor:pointer;font-size:12px;display:none}
.nav-btns{display:flex;gap:8px}
.nav-btn{background:#2d3748;border:none;color:#e2e8f0;padding:6px 14px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s}
.nav-btn.active{background:linear-gradient(90deg,#667eea,#764ba2)}
#progress-bar{width:80px;height:5px;background:#2d3748;border-radius:3px;overflow:hidden}
#progress-fill{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);transition:width .4s;width:0%}
.view{display:none;padding:20px;max-width:900px;margin:0 auto}
.view.active{display:block}
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-top:16px}
.topic-card{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid #2d3748;border-radius:12px;padding:16px;cursor:pointer;transition:all .2s}
.topic-card:hover{transform:translateY(-3px);border-color:#667eea}
.topic-card.done{border-color:#2d5a2d;background:linear-gradient(135deg,#1a2a1a,#162316)}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:8px;margin-top:6px;margin-right:4px}
.badge.time{background:#1e2050;color:#667eea}
.badge.quiz{background:#1a2a1a;color:#48bb78}
.badge.anim{background:#1e1a2a;color:#9f7aea}
.section-tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.stab{background:#2d3748;border:none;color:#e2e8f0;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s}
.stab.active{background:linear-gradient(90deg,#667eea,#764ba2)}
.stab-content{display:none}.stab-content.active{display:block}
.demo-box{background:#1a1a2e;border:1px solid #2d3748;border-radius:12px;padding:20px;margin-bottom:16px}
.demo-title{font-size:12px;font-weight:700;color:#667eea;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.demo-hint{font-size:11px;color:#718096;margin-bottom:12px}
.quiz-q{font-size:14px;font-weight:600;color:#e2e8f0;margin-bottom:12px}
.quiz-opt{padding:10px 14px;border-radius:8px;border:1px solid #2d3748;background:#1a1a2e;color:#e2e8f0;font-size:13px;cursor:pointer;margin-bottom:8px;width:100%;text-align:left;transition:all .2s}
.quiz-opt:hover{border-color:#667eea}
.quiz-opt.correct{background:#1a2a1a;border-color:#48bb78;color:#68d391}
.quiz-opt.wrong{background:#2a1a1a;border-color:#e53e3e;color:#fc8181}
.quiz-exp{font-size:12px;color:#a0aec0;font-style:italic;margin-top:8px;padding:8px;background:#12121f;border-radius:6px}
.quiz-next{margin-top:10px;background:linear-gradient(90deg,#667eea,#764ba2);border:none;color:white;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700}
.quiz-score{text-align:center;padding:20px}
.msg{max-width:80%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.6;margin-bottom:8px}
.msg.user{background:linear-gradient(135deg,#667eea,#764ba2);align-self:flex-end;border-radius:16px 16px 4px 16px;margin-left:auto}
.msg.ai{background:#1a1a2e;border:1px solid #2d3748;align-self:flex-start;border-radius:16px 16px 16px 4px}
.chat-wrap{display:flex;flex-direction:column}
.chat-box{height:300px;overflow-y:auto;display:flex;flex-direction:column;margin-bottom:12px;padding-right:4px}
.chat-input-row{display:flex;gap:8px}
.chat-input-row input{flex:1;background:#1a1a2e;border:1px solid #2d3748;border-radius:10px;padding:10px 14px;color:#e2e8f0;font-size:13px;outline:none}
.chat-send{background:linear-gradient(90deg,#667eea,#764ba2);border:none;color:white;padding:10px 18px;border-radius:10px;cursor:pointer;font-weight:700;font-size:13px}
.chat-starters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.chat-starter{background:#1a1a2e;border:1px solid #2d3748;color:#a0aec0;padding:6px 12px;border-radius:14px;cursor:pointer;font-size:11px}
.typing-dots{display:flex;gap:5px;padding:10px 14px;background:#1a1a2e;border:1px solid #2d3748;border-radius:16px 16px 16px 4px;width:fit-content;margin-bottom:8px}
.dot{width:6px;height:6px;border-radius:50%;background:#667eea;animation:bounce .9s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.slider-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.slider-row label{width:100px;font-size:12px;color:#a0aec0}
input[type=range]{flex:1;accent-color:#667eea}
.slider-val{width:40px;font-size:12px;color:#e2e8f0;text-align:right}
.mark-done-btn{background:#2d3748;border:none;color:#e2e8f0;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;float:right}
.mark-done-btn.done{background:#2d5a2d}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card2{background:#1a1a2e;border:2px solid var(--c,#2d3748);border-radius:10px;padding:14px}
</style>
</head>
<body>

<div id="nav">
  <div style="display:flex;align-items:center;gap:10px">
    <button id="back-btn" onclick="goHome()">← Back</button>
    <div class="logo"><span>👁️</span><div><div>CV Interview Prep</div><div style="font-size:10px;color:#718096;font-weight:400">2-Hour Beginner Revision</div><div style="font-size:10px;color:#9f7aea;font-weight:500;margin-top:2px">Created by Vinodhini</div></div></div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:6px">
      <div id="progress-bar"><div id="progress-fill"></div></div>
      <span id="progress-text" style="font-size:11px;color:#a0aec0">0/10</span>
    </div>
    <div class="nav-btns">
      <button class="nav-btn active" onclick="showView('home')">📋 Topics</button>
      <button class="nav-btn" onclick="showView('chat')">💬 AI Tutor</button>
    </div>
  </div>
</div>

<div id="home-view" class="view active">
  <h2 style="font-size:18px;font-weight:700;margin-bottom:4px">Your 2-Hour Revision Plan 🚀</h2>
  <p style="color:#718096;font-size:13px">Click any topic to explore it with interactive animations</p>
  <div class="topic-grid" id="topic-grid"></div>
</div>

<div id="section-view" class="view">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
    <div>
      <div id="sec-emoji" style="font-size:28px;margin-bottom:4px"></div>
      <h2 id="sec-title" style="font-size:18px;font-weight:700"></h2>
      <p id="sec-desc" style="color:#718096;font-size:13px;margin-top:4px"></p>
    </div>
    <button class="mark-done-btn" id="mark-done-btn" onclick="toggleDone()">Mark Done</button>
  </div>
  <div class="section-tabs">
    <button class="stab active" onclick="switchTab(0)">🎮 Interactive</button>
    <button class="stab" onclick="switchTab(1)">✍️ Quiz</button>
    <button class="stab" onclick="switchTab(2)">💬 Ask AI</button>
  </div>
  <div id="stab-interactive" class="stab-content active"></div>
  <div id="stab-quiz" class="stab-content"></div>
  <div id="stab-chat" class="stab-content">
    <div class="demo-box">
      <div class="demo-title">AI Tutor — Ask about this topic</div>
      <div class="chat-starters" id="sec-starters"></div>
      <div class="chat-wrap">
        <div id="sec-chat-box" class="chat-box"></div>
        <div class="chat-input-row">
          <input id="sec-chat-input" placeholder="Ask anything about this topic..."/>
          <button class="chat-send" onclick="secSend()">Send</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="chat-view" class="view">
  <h2 style="font-size:18px;font-weight:700;margin-bottom:4px">💬 AI Tutor</h2>
  <p style="color:#718096;font-size:13px;margin-bottom:16px">Ask me anything about Computer Vision</p>
  <div class="demo-box">
    <div class="chat-starters">
      <button class="chat-starter" onclick="globalSend('What is a CNN?')">What is a CNN?</button>
      <button class="chat-starter" onclick="globalSend('Explain IoU simply')">Explain IoU</button>
      <button class="chat-starter" onclick="globalSend('YOLO vs R-CNN difference?')">YOLO vs R-CNN?</button>
      <button class="chat-starter" onclick="globalSend('What is convolution?')">What is convolution?</button>
      <button class="chat-starter" onclick="globalSend('Why do CNNs work for images?')">Why CNNs for images?</button>
      <button class="chat-starter" onclick="globalSend('What is mAP in object detection?')">What is mAP?</button>
    </div>
    <div class="chat-wrap">
      <div id="chat-box" class="chat-box"></div>
      <div class="chat-input-row">
        <input id="chat-input" placeholder="Ask about any CV concept..." onkeydown="if(event.key==='Enter')globalSend()"/>
        <button class="chat-send" onclick="globalSend()">Send</button>
      </div>
    </div>
  </div>
</div>

<script>
var completed = {};
var currentSection = null;
var globalMsgs = [];
var secMsgs = {};

// ── CURRICULUM ────────────────────────────────────────────────────────────────
var curriculum = [
  {id:1,emoji:"🧠",time:"10 min",title:"Intro to Computer Vision",
   desc:"What CV is, where it's used, and how it differs from image processing.",
   starters:["What is Computer Vision?","CV vs Deep Learning?","What is the CV pipeline?"],
   quiz:[
    {q:"What does Computer Vision enable machines to do?",opts:["Hear sound","Understand images","Read code","Translate text"],c:1,exp:"CV enables machines to interpret and understand visual data like images and video."},
    {q:"Which is NOT a CV application?",opts:["Face recognition","Self-driving cars","Spell checking","Medical imaging"],c:2,exp:"Spell checking is NLP (text-based), not Computer Vision."}
   ]},
  {id:2,emoji:"🖼️",time:"20 min",title:"Image Processing Fundamentals",
   desc:"Pixels, RGB, convolution kernels — the foundation of all CV systems.",
   starters:["What is convolution?","Why apply filters?","Gaussian vs Mean filter?"],
   quiz:[
    {q:"What is a pixel?",opts:["A filter type","Smallest unit of a digital image","A kernel","A neural network"],c:1,exp:"A pixel (picture element) is the smallest unit of a digital image."},
    {q:"What does a convolution kernel do?",opts:["Stores image data","Slides over image extracting features","Converts RGB to grayscale","Resizes image"],c:1,exp:"A kernel slides over the image computing a dot product at each position."},
    {q:"RGB image has how many channels?",opts:["1","2","3","4"],c:2,exp:"RGB = Red, Green, Blue — 3 channels."}
   ]},
  {id:3,emoji:"🔍",time:"25 min",title:"Classical CV Techniques",
   desc:"Edge detection, Harris corners, SIFT, SURF, ORB — classical feature methods.",
   starters:["What is Canny edge detection?","Why was SIFT popular?","What is Harris corner?"],
   quiz:[
    {q:"Edge detection finds?",opts:["Color regions","Sharp intensity changes","Image center","Noise"],c:1,exp:"Edges are locations where pixel intensity changes sharply — usually object boundaries."},
    {q:"Difference between feature detector and descriptor?",opts:["Same thing","Detector finds location; descriptor encodes appearance","Descriptor finds location","Neither used in CV"],c:1,exp:"Detector finds WHERE keypoints are; descriptor encodes WHAT they look like for matching."}
   ]},
  {id:4,emoji:"📐",time:"15 min",title:"Image Transformations",
   desc:"Translation, rotation, scaling, affine transforms, and Hough Transform.",
   starters:["What is affine transform?","Hough transform explained","When to use image rotation?"],
   quiz:[
    {q:"Affine Transform preserves?",opts:["Angles only","Parallel lines","Distances only","Colors"],c:1,exp:"Affine transforms preserve parallel lines — includes translation, rotation, scaling, shear."},
    {q:"Hough Transform is used for?",opts:["Edge detection","Detecting geometric shapes like lines/circles","Image classification","Compression"],c:1,exp:"Hough Transform detects geometric shapes (lines, circles) even when partially occluded."}
   ]},
  {id:5,emoji:"🤖",time:"25 min",title:"Deep Learning for CV",
   desc:"Why CNNs replaced classical CV — convolutions, pooling, feature maps, architectures.",
   starters:["CNN vs ANN?","What is a feature map?","Explain ResNet skip connections"],
   quiz:[
    {q:"Why do CNNs work well for images?",opts:["They are faster","Preserve spatial structure + shared weights","Use more layers","Need less data"],c:1,exp:"CNNs use local receptive fields and shared weights, preserving spatial relationships in images."},
    {q:"What does Pooling do?",opts:["Adds features","Reduces spatial dimensions","Applies activation","Connects to output"],c:1,exp:"Pooling downsamples feature maps, reducing computation and adding spatial invariance."},
    {q:"What problem does ResNet solve?",opts:["Speed","Vanishing gradient in deep networks","Memory","Augmentation"],c:1,exp:"ResNet uses skip connections so gradients flow better, enabling very deep networks."}
   ]},
  {id:6,emoji:"📦",time:"15 min",title:"Object Detection",
   desc:"Bounding boxes, IoU, NMS, YOLO, R-CNN — detecting objects in images.",
   starters:["What is a bounding box?","Explain NMS step by step","One-stage vs two-stage detectors?"],
   quiz:[
    {q:"What is IoU?",opts:["A loss function","Intersection over Union of two boxes","A CNN type","Number of objects"],c:1,exp:"IoU = Area of Overlap / Area of Union. Measures how well a predicted box matches ground truth."},
    {q:"What does NMS do?",opts:["Data augmentation","Removes duplicate bounding boxes","A pooling type","Activation function"],c:1,exp:"NMS removes redundant detections, keeping highest confidence box and suppressing overlapping ones."},
    {q:"YOLO vs R-CNN key difference?",opts:["YOLO uses two stages","R-CNN is faster","YOLO detects in one pass; R-CNN proposes regions first","They are the same"],c:2,exp:"YOLO does everything in one forward pass (real-time); R-CNN first proposes regions then classifies."}
   ]},
  {id:7,emoji:"✂️",time:"7 min",title:"Image Segmentation",
   desc:"Semantic vs instance segmentation, U-Net, Mask R-CNN and where they are used.",
   starters:["What is semantic segmentation?","What is U-Net?","Segmentation in medical imaging?"],
   quiz:[
    {q:"Semantic vs Instance segmentation?",opts:["No difference","Semantic labels pixels by class; instance separates individual objects","Instance is faster","Semantic is for medical only"],c:1,exp:"Semantic seg classifies each pixel; instance seg also distinguishes between separate objects of the same class."}
   ]},
  {id:8,emoji:"📊",time:"5 min",title:"Evaluation Metrics",
   desc:"Accuracy, Precision, Recall, IoU, mAP — how we measure model performance.",
   starters:["Precision vs Recall trade-off?","What is mAP?","Explain confusion matrix"],
   quiz:[
    {q:"Why use mAP for object detection?",opts:["Faster to compute","Accounts for localization + classification across classes","Simpler","Accuracy is used"],c:1,exp:"mAP considers precision at different recall levels and averages across classes — more informative than accuracy."},
    {q:"High Precision means?",opts:["We found all positives","Few false alarms — predicted positives are mostly correct","High recall","Fast inference"],c:1,exp:"Precision = TP/(TP+FP). High precision means when we predict positive, we are usually right."}
   ]},
  {id:9,emoji:"📚",time:"3 min",title:"Important Libraries",
   desc:"OpenCV, PIL, scikit-image, PyTorch, TensorFlow — know when to use each.",
   starters:["OpenCV vs PIL?","When to use PyTorch vs TensorFlow?","What can OpenCV do?"],
   quiz:[
    {q:"Best library for real-time camera processing?",opts:["PIL","scikit-image","OpenCV","Matplotlib"],c:2,exp:"OpenCV is optimized for real-time CV and has excellent camera/video support."}
   ]},
  {id:10,emoji:"⚡",time:"5 min",title:"Rapid Fire Revision",
   desc:"Final quiz across all topics — simulate real interview questions!",
   starters:["Quiz me on object detection","Explain the full CV pipeline","What should I memorize?"],
   quiz:[
    {q:"What is convolution?",opts:["Multiply images","Slide kernel over image computing dot products","Divide image into patches","Rotate image"],c:1,exp:"Convolution slides a kernel over the image, computing weighted sums to produce a feature map."},
    {q:"Classification vs Detection?",opts:["Same thing","Classification labels whole image; detection also locates with bounding boxes","Detection only uses DL","Classification is faster always"],c:1,exp:"Classification answers 'Is there a cat?' Detection answers 'Where is the cat?' with a bounding box."},
    {q:"IoU threshold for correct detection?",opts:["0.1","0.3","0.5","0.9"],c:2,exp:"IoU > 0.5 is the standard threshold used in benchmarks like PASCAL VOC."},
    {q:"What is feature extraction?",opts:["Remove noise","Transform raw pixels into meaningful representations","Resize images","Convert to grayscale"],c:1,exp:"Feature extraction converts raw pixels into compact, meaningful representations used for recognition."}
   ]}
];

// ── RENDER HOME ───────────────────────────────────────────────────────────────
function renderHome() {
  var grid = document.getElementById('topic-grid');
  var html = '';
  for (var i = 0; i < curriculum.length; i++) {
    var s = curriculum[i];
    var isDone = completed[s.id] ? ' done' : '';
    html += '<div class="topic-card' + isDone + '" onclick="openSection(' + s.id + ')">';
    html += '<div style="font-size:24px;margin-bottom:8px">' + s.emoji + '</div>';
    html += '<h3 style="font-size:13px;font-weight:700;margin-bottom:4px">' + s.id + '. ' + s.title + '</h3>';
    html += '<p style="font-size:11px;color:#718096;line-height:1.4">' + s.desc + '</p>';
    html += '<div style="margin-top:8px">';
    html += '<span class="badge time">' + s.time + '</span>';
    html += '<span class="badge quiz">✍️ ' + s.quiz.length + ' Qs</span>';
    html += '<span class="badge anim">🎮 Interactive</span>';
    if (completed[s.id]) html += ' ✅';
    html += '</div></div>';
  }
  grid.innerHTML = html;
  updateProgress();
}

function updateProgress() {
  var n = 0;
  for (var k in completed) { if (completed[k]) n++; }
  document.getElementById('progress-fill').style.width = (n / curriculum.length * 100) + '%';
  document.getElementById('progress-text').textContent = n + '/' + curriculum.length;
}

function openSection(id) {
  currentSection = null;
  for (var i = 0; i < curriculum.length; i++) {
    if (curriculum[i].id === id) { currentSection = curriculum[i]; break; }
  }
  if (!currentSection) return;
  document.getElementById('sec-emoji').textContent = currentSection.emoji;
  document.getElementById('sec-title').textContent = currentSection.title;
  document.getElementById('sec-desc').textContent = currentSection.desc;
  var btn = document.getElementById('mark-done-btn');
  btn.textContent = completed[id] ? '✅ Done' : 'Mark Done';
  btn.className = 'mark-done-btn' + (completed[id] ? ' done' : '');
  // starters
  var sh = '';
  for (var j = 0; j < currentSection.starters.length; j++) {
    var q = currentSection.starters[j];
    sh += '<button class="chat-starter" onclick="secSendText(\'' + q.replace(/'/g,"&#39;") + '\')">' + q + '</button>';
  }
  document.getElementById('sec-starters').innerHTML = sh;
  document.getElementById('stab-interactive').innerHTML = buildInteractive(currentSection);
  renderQuiz(currentSection.quiz, 'stab-quiz');
  document.getElementById('sec-chat-box').innerHTML = '';
  switchTab(0);
  showView('section');
  document.getElementById('back-btn').style.display = 'block';
  setTimeout(function() { initAnimations(currentSection.id); }, 50);
}

function toggleDone() {
  var id = currentSection.id;
  completed[id] = !completed[id];
  var btn = document.getElementById('mark-done-btn');
  btn.textContent = completed[id] ? '✅ Done' : 'Mark Done';
  btn.className = 'mark-done-btn' + (completed[id] ? ' done' : '');
  updateProgress();
}

function switchTab(idx) {
  var stabs = document.querySelectorAll('.stab');
  var contents = document.querySelectorAll('.stab-content');
  for (var i = 0; i < stabs.length; i++) {
    stabs[i].classList.toggle('active', i === idx);
    contents[i].classList.toggle('active', i === idx);
  }
}

function goHome() {
  showView('home');
  renderHome();
  document.getElementById('back-btn').style.display = 'none';
}

function showView(name) {
  var views = document.querySelectorAll('.view');
  for (var i = 0; i < views.length; i++) views[i].classList.remove('active');
  document.getElementById(name + '-view').classList.add('active');
  var navBtns = document.querySelectorAll('.nav-btn');
  navBtns[0].classList.toggle('active', name === 'home');
  navBtns[1].classList.toggle('active', name === 'chat');
  if (name !== 'section') document.getElementById('back-btn').style.display = 'none';
}

// ── BUILD INTERACTIVE ─────────────────────────────────────────────────────────
function buildInteractive(s) {
  switch(s.id) {
    case 1:  return buildIntro();
    case 2:  return buildImgProcessing();
    case 3:  return buildClassicalCV();
    case 4:  return buildTransforms();
    case 5:  return buildCNN();
    case 6:  return buildObjectDetection();
    case 7:  return buildSegmentation();
    case 8:  return buildMetrics();
    case 9:  return buildLibraries();
    case 10: return '<div class="demo-box" style="text-align:center;padding:30px"><div style="font-size:48px;margin-bottom:12px">⚡</div><p style="color:#a0aec0;margin-bottom:16px">This section is all quiz! Switch to the Quiz tab.</p><button class="quiz-next" onclick="switchTab(1)">Start Rapid Fire Quiz →</button></div>';
    default: return '<p style="color:#718096">Demo coming soon.</p>';
  }
}

// ── SECTION 1: INTRO ─────────────────────────────────────────────────────────
function buildIntro() {
  var apps = [
    {icon:"😊",title:"Face Recognition",color:"#667eea",fact:"Your phone uses ~68 facial landmarks to verify identity in milliseconds!"},
    {icon:"🚗",title:"Self-Driving Cars",color:"#ed8936",fact:"Cars process 30+ camera frames per second detecting pedestrians, lanes and signs simultaneously."},
    {icon:"🏥",title:"Medical Imaging",color:"#e53e3e",fact:"CNNs detect diabetic retinopathy from eye scans with 90%+ accuracy — matching doctors!"},
    {icon:"📄",title:"OCR",color:"#48bb78",fact:"Optical Character Recognition converts text in images to editable text. Used in Google Translate camera mode!"},
    {icon:"🏭",title:"Quality Control",color:"#9f7aea",fact:"Factories use CV to inspect thousands of products per minute for defects invisible to the human eye."},
    {icon:"🌿",title:"Agriculture",color:"#68d391",fact:"Drones with CV detect crop diseases early, scanning fields 10x faster than manual inspection."}
  ];
  var html = '<div class="demo-box">';
  html += '<div class="demo-title">🌍 Real-World CV Applications — Click each!</div>';
  html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px">';
  for (var i = 0; i < apps.length; i++) {
    var a = apps[i];
    var fact = a.fact.replace(/'/g, "&#39;");

function showFact(el, fact) {

function animatePipeline() {
  var steps = document.querySelectorAll('.pipeline-step');
  for (var i = 0; i < steps.length; i++) {
    steps[i].style.opacity = '.4';
    steps[i].style.borderColor = '#2d3748';
    steps[i].style.background = '#1a1a2e';
  }
  (function animate(idx) {
    if (idx >= steps.length) return;
    var s = steps[idx];
    var col = s.getAttribute('data-color');
    s.style.opacity = '1';
    s.style.borderColor = col;
    s.style.background = col + '22';
    s.style.transform = 'scale(1.1)';
    setTimeout(function() { s.style.transform = 'scale(1)'; }, 300);
    setTimeout(function() { animate(idx + 1); }, 500);
  })(0);
}

// ── CONVOLUTION ───────────────────────────────────────────────────────────────
var convStep = 0;
var convImg = [[80,90,100,110,80],[70,200,210,200,70],[65,205,215,205,65],[70,190,200,190,70],[80,85,95,85,80]];
var convKernel = [[-1,-1,-1],[-1,8,-1],[-1,-1,-1]];

function drawConvStep() {
  var c = document.getElementById('conv-canvas'); if (!c) return;
  var ctx = c.getContext('2d'); ctx.clearRect(0,0,520,200);
  var r = Math.floor(convStep / 3), co = convStep % 3;
  var sz = 32, ox = 10, oy = 20;
  ctx.font = '11px Segoe UI'; ctx.textAlign = 'center';
  ctx.fillStyle = '#a0aec0'; ctx.fillText('Input (5x5)', ox + 2.5*sz, 14);
  for (var i = 0; i < 5; i++) {
    for (var j = 0; j < 5; j++) {
      var inPatch = (i >= r && i <= r+2 && j >= co && j <= co+2);
      ctx.fillStyle = inPatch ? '#553c9a' : '#1e2050';
      ctx.fillRect(ox + j*sz, oy + i*sz, sz-2, sz-2);
      ctx.fillStyle = inPatch ? '#fff' : '#a0aec0';
      ctx.fillText(convImg[i][j], ox + j*sz + (sz-2)/2, oy + i*sz + (sz-2)/2 + 4);
    }
  }
  var kox = 210;
  ctx.fillStyle = '#a0aec0'; ctx.fillText('Kernel (3x3)', kox + 1.5*sz, 14);
  for (var ki = 0; ki < 3; ki++) {
    for (var kj = 0; kj < 3; kj++) {
      ctx.fillStyle = '#1e2050'; ctx.strokeStyle = '#667eea'; ctx.lineWidth = 1;
      ctx.fillRect(kox + kj*sz, oy + ki*sz, sz-2, sz-2);
      ctx.strokeRect(kox + kj*sz, oy + ki*sz, sz-2, sz-2);
      ctx.fillStyle = convKernel[ki][kj] < 0 ? '#fc8181' : '#68d391';
      ctx.fillText(convKernel[ki][kj], kox + kj*sz + (sz-2)/2, oy + ki*sz + (sz-2)/2 + 4);
    }
  }
  var res = 0;
  for (var ri = 0; ri < 3; ri++) for (var rj = 0; rj < 3; rj++) res += convImg[r+ri][co+rj] * convKernel[ri][rj];
  var rox = 390;
  ctx.fillStyle = '#a0aec0'; ctx.fillText('Result', rox + sz*0.75, 14);
  ctx.fillStyle = '#1a2a1a'; ctx.strokeStyle = '#48bb78'; ctx.lineWidth = 2;
  ctx.fillRect(rox, oy + sz, sz*1.5, sz*1.5);
  ctx.strokeRect(rox, oy + sz, sz*1.5, sz*1.5);
  ctx.fillStyle = '#68d391'; ctx.font = 'bold 16px Segoe UI';
  ctx.fillText(res, rox + sz*0.75, oy + sz + sz*0.75 + 5);
  ctx.strokeStyle = '#4a5568'; ctx.lineWidth = 1;
  ctx.font = '14px Segoe UI'; ctx.fillStyle = '#4a5568';
  ctx.fillText('x', kox - 14, oy + 85);
  ctx.fillText('=', rox - 14, oy + 85);
  document.getElementById('conv-step-label').textContent = 'Step ' + (convStep+1) + ' / 9  — Position (' + r + ',' + co + ')';
}
function stepConv(d) { convStep = Math.max(0, Math.min(8, convStep + d)); drawConvStep(); }
function autoConv() {
  var s = 0;
  var iv = setInterval(function() { convStep = s; drawConvStep(); s++; if (s > 8) clearInterval(iv); }, 600);
}

// ── FILTER DEMO ───────────────────────────────────────────────────────────────
function applyFilterDemo(mode) {
  var c = document.getElementById('filter-canvas'); if (!c) return;
  var ctx = c.getContext('2d'); ctx.clearRect(0,0,400,120);
  var labels = {original:'Original',blur:'Gaussian Blur',sharpen:'Sharpened',edge:'Edge Detected'};
  document.getElementById('filter-label').textContent = 'Showing: ' + labels[mode];
  var cols = 13, rows = 4, sw = 28, sh = 26;
  for (var row = 0; row < rows; row++) {
    for (var col = 0; col < cols; col++) {
      var base = ((row*3 + col*7)*17 + row*col*11) % 80 + 80;
      var val = base;
      if (mode === 'blur') val = base * 0.7 + 30;
      else if (mode === 'sharpen') val = Math.min(255, base + (row===1 && col>4 && col<8 ? 80 : 0));
      else if (mode === 'edge') { val = Math.abs(((row*col)%10 - 5)*30); if (row===1 || col===5 || col===8) val = Math.min(255, val+150); }
      if (mode === 'edge') ctx.fillStyle = 'rgb(' + val + ',' + val + ',' + val + ')';
      else ctx.fillStyle = 'rgb(' + Math.floor(val*0.8) + ',' + Math.floor(val*0.7) + ',' + val + ')';
      ctx.fillRect(col*sw+1, row*sh+8, sw-2, sh-2);
    }
  }
  ctx.fillStyle = 'rgba(0,0,0,.5)'; ctx.fillRect(0,0,400,20);
  ctx.fillStyle = '#a0aec0'; ctx.font = '10px Segoe UI'; ctx.textAlign = 'left';
  ctx.fillText(labels[mode], 6, 13);
}

// ── DRAW & EDGE ───────────────────────────────────────────────────────────────
var isDrawing = false;
function initDrawCanvas() {
  var c = document.getElementById('draw-canvas'); if (!c) return;
  var ctx = c.getContext('2d');
  ctx.strokeStyle = '#000'; ctx.lineWidth = 4; ctx.lineCap = 'round';
  ctx.fillStyle = '#fff'; ctx.fillRect(0,0,260,200);
  c.addEventListener('mousedown', function(e) { isDrawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); });
  c.addEventListener('mousemove', function(e) { if (!isDrawing) return; ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); });
  c.addEventListener('mouseup', function() { isDrawing = false; });
  c.addEventListener('touchstart', function(e) {
    e.preventDefault(); isDrawing = true;
    var t = e.touches[0], r = c.getBoundingClientRect();
    ctx.beginPath(); ctx.moveTo(t.clientX - r.left, t.clientY - r.top);
  }, {passive:false});
  c.addEventListener('touchmove', function(e) {
    e.preventDefault(); if (!isDrawing) return;
    var t = e.touches[0], r = c.getBoundingClientRect();
    ctx.lineTo(t.clientX - r.left, t.clientY - r.top); ctx.stroke();
  }, {passive:false});
  c.addEventListener('touchend', function() { isDrawing = false; });
}
function clearDraw() {
  var c = document.getElementById('draw-canvas'); if (!c) return;
  var ctx = c.getContext('2d'); ctx.fillStyle = '#fff'; ctx.fillRect(0,0,260,200);
  var ec = document.getElementById('edge-canvas'); if (!ec) return;
  ec.getContext('2d').clearRect(0,0,260,200);
}
function drawSampleShape() {
  var c = document.getElementById('draw-canvas'); if (!c) return;
  var ctx = c.getContext('2d'); ctx.fillStyle = '#fff'; ctx.fillRect(0,0,260,200);
  ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.arc(80,100,50,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.rect(150,50,80,100); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(140,160); ctx.lineTo(200,80); ctx.lineTo(240,160); ctx.closePath(); ctx.stroke();
}
function detectEdges() {
  var src = document.getElementById('draw-canvas'); if (!src) return;
  var dst = document.getElementById('edge-canvas'); if (!dst) return;
  var sctx = src.getContext('2d'), dctx = dst.getContext('2d');
  var d = sctx.getImageData(0,0,260,200);
  var out = dctx.createImageData(260,200);
  var gray = new Uint8ClampedArray(260*200);
  for (var i = 0; i < gray.length; i++) gray[i] = 0.299*d.data[i*4] + 0.587*d.data[i*4+1] + 0.114*d.data[i*4+2];
  var sx = [-1,0,1,-2,0,2,-1,0,1], sy = [-1,-2,-1,0,0,0,1,2,1];
  for (var y = 1; y < 199; y++) {
    for (var x = 1; x < 259; x++) {
      var gx = 0, gy2 = 0;
      for (var ky = 0; ky < 3; ky++) for (var kx = 0; kx < 3; kx++) {
        var idx2 = (y+ky-1)*260+(x+kx-1);
        gx += gray[idx2]*sx[ky*3+kx]; gy2 += gray[idx2]*sy[ky*3+kx];
      }
      var mag = Math.min(255, Math.sqrt(gx*gx + gy2*gy2));
      var edge = mag > 40 ? 255 : 0;
      var ii = (y*260+x)*4;
      out.data[ii] = out.data[ii+1] = out.data[ii+2] = edge; out.data[ii+3] = 255;
    }
  }
  dctx.putImageData(out, 0, 0);
}

// ── CORNERS ───────────────────────────────────────────────────────────────────
function drawCornerScene(showCorners) {
  var c = document.getElementById('corner-canvas'); if (!c) return;
  var ctx = c.getContext('2d'); ctx.clearRect(0,0,300,200);
  ctx.strokeStyle = '#4a5568'; ctx.lineWidth = 2;
  ctx.strokeRect(30,30,100,100);
  ctx.beginPath(); ctx.moveTo(180,50); ctx.lineTo(260,50); ctx.lineTo(220,140); ctx.closePath(); ctx.stroke();
  ctx.beginPath(); ctx.arc(150,155,28,0,Math.PI*2); ctx.stroke();
  if (showCorners) {
    var pts = [[30,30],[130,30],[30,130],[130,130],[180,50],[260,50],[220,140]];
    for (var pi3 = 0; pi3 < pts.length; pi3++) {
      var x = pts[pi3][0], y = pts[pi3][1];
      ctx.beginPath(); ctx.arc(x,y,8,0,Math.PI*2);
      ctx.fillStyle = 'rgba(255,100,100,.3)'; ctx.fill();
      ctx.strokeStyle = '#e53e3e'; ctx.lineWidth = 2; ctx.stroke();
      ctx.fillStyle = '#e53e3e'; ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2); ctx.fill();
    }
    ctx.fillStyle = '#a0aec0'; ctx.font = '11px Segoe UI'; ctx.textAlign = 'left';
    ctx.fillText('Found ' + pts.length + ' corners!', 10, 192);
  }
}
function animateCorners() {
  drawCornerScene(false);
  var pts = [[30,30],[130,30],[30,130],[130,130],[180,50],[260,50],[220,140]];
  var found = 0;
  var c = document.getElementById('corner-canvas'); if (!c) return;
  var ctx = c.getContext('2d');
  var iv = setInterval(function() {
    if (found >= pts.length) { clearInterval(iv); return; }
    var x = pts[found][0], y = pts[found][1];
    ctx.beginPath(); ctx.arc(x,y,8,0,Math.PI*2);
    ctx.fillStyle = 'rgba(255,100,100,.3)'; ctx.fill();
    ctx.strokeStyle = '#e53e3e'; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#e53e3e'; ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2); ctx.fill();
    found++;
  }, 300);
}

var houghPts = [];
function initHoughCanvas() {
  var c = document.getElementById('hough-canvas'); if (!c) return;
  c.addEventListener('click', function(e) {
    houghPts.push({x: e.offsetX, y: e.offsetY});
    drawHough([]);
  });
}
function drawHough(lines) {
  var c = document.getElementById('hough-canvas'); if (!c) return;
  var ctx = c.getContext('2d'); ctx.clearRect(0,0,300,200);
  for (var i = 0; i < houghPts.length; i++) {
    ctx.beginPath(); ctx.arc(houghPts[i].x, houghPts[i].y, 5,0,Math.PI*2);
    ctx.fillStyle = '#667eea'; ctx.fill();
  }
  for (var li2 = 0; li2 < lines.length; li2++) {
    var l = lines[li2];
    ctx.beginPath(); ctx.moveTo(l[0],l[1]); ctx.lineTo(l[2],l[3]);
    ctx.strokeStyle = '#e53e3e'; ctx.lineWidth = 2; ctx.stroke();
  }
}
function clearHough() { houghPts = []; drawHough([]); document.getElementById('hough-info').textContent = 'Canvas cleared.'; }
function addNoisyLine() {
  var y = 50 + Math.random() * 120;
  for (var x = 20; x < 280; x += 15 + Math.random()*20) houghPts.push({x: x, y: y + Math.random()*20 - 10});
  drawHough([]);
}
function detectHoughLines() {
  if (houghPts.length < 3) { document.getElementById('hough-info').textContent = 'Add at least 3 points first!'; return; }
  var avgY = 0;
  for (var i = 0; i < houghPts.length; i++) avgY += houghPts[i].y;
  avgY /= houghPts.length;
  drawHough([[10, avgY, 290, avgY]]);
  document.getElementById('hough-info').textContent = 'Detected 1 line from ' + houghPts.length + ' points using Hough voting!';
}

// ── CNN ───────────────────────────────────────────────────────────────────────
var cnnLayers = [
  {label:"Input\n28x28",    color:"#4299e1",info:"Raw image pixels. A 28x28 grayscale image = 784 numbers fed into the network."},
  {label:"Conv\n+ ReLU",   color:"#9f7aea",info:"Learnable filters detect edges, curves, textures. ReLU sets negatives to 0 (non-linearity)."},
  {label:"Pooling\n14x14", color:"#ed8936",info:"Max Pooling reduces size by taking the max in each 2x2 block. Halves dimensions."},
  {label:"Conv\n+ ReLU",   color:"#9f7aea",info:"Second conv layer learns higher-level features like shapes and object parts."},
  {label:"Pooling\n7x7",   color:"#ed8936",info:"Another pooling step — further reduces spatial dimensions to 7x7."},
  {label:"Flatten",        color:"#e53e3e",info:"Convert 2D feature maps to a 1D vector — ready for fully connected layers."},
  {label:"FC Layer",       color:"#4299e1",info:"Fully Connected: every neuron connects to all inputs. Learns feature combinations."},
  {label:"Output\nSoftmax",color:"#48bb78",info:"One probability per class. Highest = prediction! e.g. 'cat: 92%, dog: 5%'"}
];
function drawCNN() {
  var c = document.getElementById('cnn-canvas'); if (!c) return;
  var ctx = c.getContext('2d'), W = 560, H = 180, n = cnnLayers.length;
  var bw = W/n - 6, bh = 58;
  ctx.clearRect(0,0,W,H);
  for (var i = 0; i < n; i++) {
    var l = cnnLayers[i];
    var x = i*(W/n)+3, y = (H-bh)/2;
    ctx.fillStyle = l.color + '33'; ctx.strokeStyle = l.color; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.roundRect(x,y,bw,bh,5); ctx.fill(); ctx.stroke();
    ctx.fillStyle = l.color; ctx.font = 'bold 9px Segoe UI'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    var lines = l.label.split('\n');
    for (var li3 = 0; li3 < lines.length; li3++) ctx.fillText(lines[li3], x+bw/2, y+bh/2+(li3-0.5)*12);
    if (i < n-1) { ctx.strokeStyle = '#4a5568'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(x+bw+1,H/2); ctx.lineTo(x+bw+5,H/2); ctx.stroke(); }
  }
}
function handleCNNClick(e) {
  var c = document.getElementById('cnn-canvas'); if (!c) return;
  var rect = c.getBoundingClientRect(), n = cnnLayers.length;
  var x = (e.clientX - rect.left) * (c.width / rect.width);
  var idx = Math.floor(x / (c.width / n));
  if (idx >= 0 && idx < n) {
    var l = cnnLayers[idx];
    document.getElementById('cnn-info').innerHTML = '<b style="color:' + l.color + '">' + l.label.replace('\n',' ') + '</b> — ' + l.info;
  }
}

var bboxClass = 'person';
var bboxes = [];
var bboxDrawing = false;
var bboxStart = {x:0,y:0};
var bboxColors = {person:'#4299e1',car:'#e53e3e',dog:'#48bb78'};

function setBboxClass(cls) {
  bboxClass = cls;
  document.getElementById('bbox-info').textContent = 'Drawing: ' + cls + '. Drag on canvas!';
}
function initBboxCanvas() {
  var c = document.getElementById('bbox-canvas'); if (!c) return;
  drawBboxScene(null);
  c.addEventListener('mousedown', function(e) {
    bboxDrawing = true;
    var r = c.getBoundingClientRect();
    bboxStart = {x:(e.clientX-r.left)*(c.width/r.width), y:(e.clientY-r.top)*(c.height/r.height)};
  });
  c.addEventListener('mousemove', function(e) {
    if (!bboxDrawing) return;
    var r = c.getBoundingClientRect();
    var cx = (e.clientX-r.left)*(c.width/r.width), cy = (e.clientY-r.top)*(c.height/r.height);
    drawBboxScene({x:bboxStart.x, y:bboxStart.y, w:cx-bboxStart.x, h:cy-bboxStart.y, cls:bboxClass});
  });
  c.addEventListener('mouseup', function(e) {
    if (!bboxDrawing) return; bboxDrawing = false;
    var r = c.getBoundingClientRect();
    var cx = (e.clientX-r.left)*(c.width/r.width), cy = (e.clientY-r.top)*(c.height/r.height);
    var w = cx-bboxStart.x, h = cy-bboxStart.y;
    if (Math.abs(w) > 10 && Math.abs(h) > 10) {
      bboxes.push({x:bboxStart.x, y:bboxStart.y, w:w, h:h, cls:bboxClass});
      document.getElementById('bbox-info').textContent = bboxes.length + ' box(es). Last: [' + Math.round(bboxStart.x) + ',' + Math.round(bboxStart.y) + ',' + Math.round(w) + ',' + Math.round(h) + ']';
    }
    drawBboxScene(null);
  });
}
function drawBboxScene(live) {
  var c = document.getElementById('bbox-canvas'); if (!c) return;
  var ctx = c.getContext('2d'); ctx.clearRect(0,0,500,260);
  ctx.fillStyle = '#1e2a3a'; ctx.fillRect(0,0,500,260);
  ctx.fillStyle = '#243040'; ctx.fillRect(0,110,500,80);
  ctx.fillStyle = '#2d3e50'; ctx.fillRect(0,185,500,75);
  var objs = [[60,70,80,120,'#5a4a3a'],[200,90,90,100,'#4a3a2a'],[360,80,80,110,'#5a4a3a']];
  for (var oi = 0; oi < objs.length; oi++) {
    ctx.fillStyle = objs[oi][4]; ctx.fillRect(objs[oi][0],objs[oi][1],objs[oi][2],objs[oi][3]);
  }
  ctx.fillStyle = 'rgba(0,0,0,.4)'; ctx.fillRect(0,0,500,18);
  ctx.fillStyle = '#4a5568'; ctx.font = '10px Segoe UI'; ctx.textAlign = 'center';
  ctx.fillText('Draw boxes around the objects!', 250, 12);
  for (var bi = 0; bi < bboxes.length; bi++) drawBox(ctx, bboxes[bi], false);
  if (live) drawBox(ctx, live, true);
}
function drawBox(ctx, b, dashed) {
  var col = bboxColors[b.cls] || '#fff';
  ctx.setLineDash(dashed ? [5,3] : []);
  ctx.strokeStyle = col; ctx.lineWidth = 2;
  ctx.strokeRect(b.x, b.y, b.w, b.h);
  ctx.setLineDash([]);
  if (!dashed) {
    var label = b.cls;
    ctx.font = 'bold 11px Segoe UI'; ctx.textAlign = 'left';
    var tw = ctx.measureText(label).width;
    ctx.fillStyle = col; ctx.fillRect(b.x, b.y-18, tw+10, 18);
    ctx.fillStyle = '#0f0f1a'; ctx.fillText(label, b.x+4, b.y-5);
  }
}
function clearBboxes() { bboxes = []; drawBboxScene(null); }

// ── IoU ───────────────────────────────────────────────────────────────────────
function updateIoU() {
  var v = +document.getElementById('iou-slider').value;
  document.getElementById('iou-val').textContent = v;
  var c = document.getElementById('iou-canvas'); if (!c) return;
  var ctx = c.getContext('2d'); ctx.clearRect(0,0,260,200);
  var shift = 80 - v*0.7;
  var ax=20, ay=20, aw=130, ah=130;
  var bx=ax+shift, by=ay+shift*0.5, bw=aw, bh=ah;
  var ix=Math.max(ax,bx), iy=Math.max(ay,by), iw=Math.min(ax+aw,bx+bw)-ix, ih=Math.min(ay+ah,by+bh)-iy;
  var inter = Math.max(0,iw)*Math.max(0,ih);
  var union = aw*ah + bw*bh - inter;
  var iou = union > 0 ? inter/union : 0;
  ctx.fillStyle = 'rgba(66,153,225,.25)'; ctx.fillRect(ax,ay,aw,ah);
  ctx.strokeStyle = '#4299e1'; ctx.lineWidth = 2; ctx.strokeRect(ax,ay,aw,ah);
  ctx.fillStyle = 'rgba(229,62,62,.25)'; ctx.fillRect(bx,by,bw,bh);
  ctx.strokeStyle = '#e53e3e'; ctx.lineWidth = 2; ctx.strokeRect(bx,by,bw,bh);
  if (iw > 0 && ih > 0) { ctx.fillStyle = 'rgba(236,201,75,.5)'; ctx.fillRect(ix,iy,iw,ih); }
  ctx.fillStyle = '#a0aec0'; ctx.font = '10px Segoe UI'; ctx.textAlign = 'left';
  ctx.fillText('GT', ax+4, ay+14); ctx.fillText('Pred', bx+4, by+14);
  document.getElementById('iou-score').textContent = iou.toFixed(2);
  document.getElementById('iou-score').style.color = iou >= 0.5 ? '#48bb78' : '#e53e3e';
  document.getElementById('iou-verdict').textContent = iou >= 0.5 ? '✅ Good Detection' : '❌ Poor Detection (IoU < 0.5)';
}

var nmsBoxes = [
  {x:50,y:40,w:160,h:140,conf:.92,alive:true},
  {x:70,y:55,w:150,h:130,conf:.88,alive:true},
  {x:55,y:45,w:155,h:135,conf:.75,alive:true},
  {x:220,y:50,w:140,h:130,conf:.85,alive:true},
  {x:235,y:60,w:130,h:120,conf:.72,alive:true}
];
function resetNMS() {
  for (var i = 0; i < nmsBoxes.length; i++) nmsBoxes[i].alive = true;
  drawNMS();
  document.getElementById('nms-info').textContent = 'Click Run NMS to remove duplicate boxes';
}
function drawNMS() {
  var c = document.getElementById('nms-canvas'); if (!c) return;
  var ctx = c.getContext('2d'); ctx.clearRect(0,0,400,220);
  ctx.fillStyle = '#1e2a3a'; ctx.fillRect(0,0,400,220);
  ctx.fillStyle = '#2a3a4a'; ctx.fillRect(30,30,170,160); ctx.fillRect(220,30,160,160);
  ctx.fillStyle = '#4a5568'; ctx.font = '10px Segoe UI'; ctx.textAlign = 'center';
  ctx.fillText('Object 1',115,205); ctx.fillText('Object 2',300,205);
  for (var i = 0; i < nmsBoxes.length; i++) {
    var b = nmsBoxes[i];
    ctx.setLineDash(b.alive ? [] : [4,3]);
    ctx.strokeStyle = !b.alive ? '#e53e3e44' : b.conf > 0.89 ? '#48bb78' : '#ed8936';
    ctx.lineWidth = 2; ctx.strokeRect(b.x,b.y,b.w,b.h);
    ctx.setLineDash([]);
    if (b.alive) {
      ctx.fillStyle = b.conf > 0.89 ? '#48bb78' : '#ed8936';
      ctx.font = '10px Segoe UI'; ctx.textAlign = 'left';
      ctx.fillText(b.conf.toFixed(2), b.x+4, b.y+12);
    }
  }
}
function animateNMS() {
  var suppress = [1,2,4];
  var i = 0;
  var iv = setInterval(function() {
    if (i >= suppress.length) { clearInterval(iv); document.getElementById('nms-info').textContent = 'NMS done! Kept 2 best boxes (green). Removed 3 duplicates.'; return; }
    nmsBoxes[suppress[i]].alive = false;
    drawNMS();
    document.getElementById('nms-info').textContent = 'Suppressing box with conf=' + nmsBoxes[suppress[i]].conf + ' (overlaps best box too much)';
    i++;
  }, 800);
}

// ── SEGMENTATION ─────────────────────────────────────────────────────────────
function drawSegScene(mode) {
  var c = document.getElementById('seg-canvas'); if (!c) return;
  var ctx = c.getContext('2d'); ctx.clearRect(0,0,400,220);
  var infos = {
    original:'Original scene — no labels applied',
    semantic:'Semantic: all cars = same blue, all people = same red (class only, no individual IDs)',
    instance:'Instance: each individual object gets its own unique colour'
  };
  document.getElementById('seg-info').textContent = infos[mode];
  var semColors = {car:'rgba(66,153,225,.75)',person:'rgba(229,62,62,.75)',road:'rgba(90,90,90,.8)',sky:'rgba(66,153,225,.3)'};
  var instCols = ['rgba(255,100,100,.75)','rgba(100,255,100,.75)','rgba(255,200,50,.75)','rgba(200,50,255,.75)','rgba(50,200,255,.75)','rgba(255,150,50,.75)'];
  var instIdx = 0;
  // sky
  ctx.fillStyle = mode==='original'?'#1a3a5a': mode==='semantic'?semColors.sky:instCols[instIdx++];
  ctx.fillRect(0,0,400,90);
  // road
  ctx.fillStyle = mode==='original'?'#3a3a3a': mode==='semantic'?semColors.road:instCols[instIdx++];
  ctx.fillRect(0,165,400,55);
  // cars
  var cars = [[20,100,120,70],[160,110,110,65]];
  for (var ci2 = 0; ci2 < cars.length; ci2++) {
    var car = cars[ci2];
    ctx.fillStyle = mode==='original'?'#4a5568': mode==='semantic'?semColors.car:instCols[instIdx++];
    ctx.fillRect(car[0],car[1],car[2],car[3]);
    if (mode==='original') { ctx.fillStyle='#2d3748'; ctx.fillRect(car[0]+10,car[1]+10,car[2]-20,car[3]/2-5); }
  }
  // people
  var people = [[290,60,40,120],[340,70,35,110]];
  for (var pi4 = 0; pi4 < people.length; pi4++) {
    var person = people[pi4];
    ctx.fillStyle = mode==='original'?'#a0aec0': mode==='semantic'?semColors.person:instCols[instIdx % instCols.length]; instIdx++;
    ctx.beginPath(); ctx.arc(person[0]+person[2]/2, person[1]+14, 12,0,Math.PI*2); ctx.fill();
    ctx.fillRect(person[0]+5, person[1]+26, person[2]-10, person[3]-26);
  }
  ctx.fillStyle = 'rgba(0,0,0,.5)'; ctx.fillRect(0,0,400,18);
  ctx.fillStyle = '#fff'; ctx.font = '10px Segoe UI'; ctx.textAlign = 'center';
  ctx.fillText(mode.toUpperCase(), 200, 12);
}

function drawUNet() {
  var c = document.getElementById('unet-canvas'); if (!c) return;
  var ctx = c.getContext('2d'); ctx.clearRect(0,0,500,200);
  var enc = [{x:10,w:60,h:160,label:'Input'},{x:80,w:50,h:130,label:'Conv1'},{x:140,w:40,h:100,label:'Conv2'},{x:190,w:30,h:70,label:'Bottleneck'}];
  var dec = [{x:230,w:40,h:100,label:'Up1'},{x:280,w:50,h:130,label:'Up2'},{x:340,w:60,h:160,label:'Output'}];
  var cy = 100;
  var all = enc.concat(dec);
  for (var i = 0; i < all.length; i++) {
    var l = all[i];
    var col = i < 4 ? '#667eea' : '#48bb78';
    ctx.fillStyle = col+'33'; ctx.strokeStyle = col; ctx.lineWidth = 2;
    ctx.fillRect(l.x, cy-l.h/2, l.w, l.h); ctx.strokeRect(l.x, cy-l.h/2, l.w, l.h);
    ctx.fillStyle = col; ctx.font = '9px Segoe UI'; ctx.textAlign = 'center';
    ctx.fillText(l.label, l.x+l.w/2, cy+l.h/2+12);
  }
  var skipPairs = [[enc[1],dec[1]],[enc[2],dec[0]]];
  ctx.strokeStyle = '#ed8936'; ctx.lineWidth = 1; ctx.setLineDash([4,3]);
  for (var si2 = 0; si2 < skipPairs.length; si2++) {
    var e2 = skipPairs[si2][0], d2 = skipPairs[si2][1];
    ctx.beginPath(); ctx.moveTo(e2.x+e2.w/2, cy-e2.h/2); ctx.lineTo(d2.x+d2.w/2, cy-d2.h/2); ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.fillStyle = '#a0aec0'; ctx.font = '10px Segoe UI'; ctx.textAlign = 'center';
  ctx.fillText('Encoder (compress)', 110, 16);
  ctx.fillText('Decoder (expand)', 305, 16);
  ctx.fillStyle = '#ed8936'; ctx.fillText('Skip Connections (orange dashes)', 250, 188);
}

  document.getElementById('fp-v').textContent = fp;

  var prec = tp/(tp+fp) || 0, rec = tp/(tp+fn) || 0, f1 = 2*prec*rec/(prec+rec) || 0;
  var acc = tp/(tp+fp+fn) || 0;
  var mets = [
    {label:'Precision',val:prec,color:'#4299e1',def:'TP/(TP+FP)'},
    {label:'Recall',val:rec,color:'#48bb78',def:'TP/(TP+FN)'},
    {label:'F1 Score',val:f1,color:'#9f7aea',def:'2×P×R/(P+R)'},
    {label:'Accuracy',val:acc,color:'#ed8936',def:'TP/(TP+FP+FN)'}
  ];
  var html = '';
  for (var i = 0; i < mets.length; i++) {
    var m = mets[i];
    html += '<div style="background:#1a1a2e;border:1px solid ' + m.color + ';border-radius:8px;padding:8px;text-align:center">';
    html += '<div style="color:' + m.color + ';font-size:10px;font-weight:700">' + m.label + '</div>';
    html += '<div style="font-size:20px;font-weight:700;color:#e2e8f0">' + (m.val*100).toFixed(0) + '%</div>';

function updateMAP() {
  var v = +document.getElementById('map-thresh').value;
  document.getElementById('map-thresh-v').textContent = (v/100).toFixed(2);
  var c = document.getElementById('map-canvas'); if (!c) return;
  var ctx = c.getContext('2d'); ctx.clearRect(0,0,500,200);
  var classes = ['Person','Car','Dog','Cat','Bike'];
  var aps = [0.82,0.74,0.69,0.78,0.65];
  var factor = v < 50 ? 1 : v < 70 ? 0.9 : v < 85 ? 0.75 : 0.55;
  var scaled = [], mAP = 0;
  for (var i = 0; i < aps.length; i++) { scaled.push(Math.max(0,aps[i]*factor)); mAP += scaled[i]; }
  mAP /= aps.length;
  ctx.fillStyle = '#a0aec0'; ctx.font = '11px Segoe UI'; ctx.textAlign = 'center';
  ctx.fillText('mAP @ IoU=' + (v/100).toFixed(2) + ':  ' + (mAP*100).toFixed(1) + '%', 250, 16);
  var barCols = ['#4299e1','#e53e3e','#48bb78','#9f7aea','#ed8936'];
  for (var j = 0; j < scaled.length; j++) {
    var bx = 30+j*88, bw2 = 72, bh = scaled[j]*(150-25);
    ctx.fillStyle = barCols[j]+'44'; ctx.fillRect(bx,160-bh,bw2,bh);
    ctx.strokeStyle = barCols[j]; ctx.lineWidth = 1.5; ctx.strokeRect(bx,160-bh,bw2,bh);
    ctx.fillStyle = barCols[j]; ctx.font = '10px Segoe UI'; ctx.textAlign = 'center';
    ctx.fillText(classes[j], bx+bw2/2, 176);

  }
  ctx.strokeStyle = '#667eea'; ctx.lineWidth = 1; ctx.setLineDash([4,3]);
  ctx.beginPath(); ctx.moveTo(20,160-mAP*(150-25)); ctx.lineTo(480,160-mAP*(150-25)); ctx.stroke();
  ctx.setLineDash([]);
}

var faceDetected = false;
var showFaceLandmarks = true;
var facePeople = [
  {x:40, y:30, w:90, h:110, label:'Face 1', conf:0.98,
   landmarks:{left_eye:[75,65], right_eye:[105,65], nose:[90,85], left_mouth:[72,105], right_mouth:[108,105]}},
  {x:180, y:45, w:80, h:100, label:'Face 2', conf:0.95,

  {x:310, y:35, w:85, h:105, label:'Face 3', conf:0.91,
   landmarks:{left_eye:[335,68], right_eye:[363,68], nose:[349,88], left_mouth:[330,110], right_mouth:[366,110]}}
];
function initFaceCanvas() {
  var c = document.getElementById('face-canvas'); if (!c) return;
  drawFaceScene(false, false);
}
function drawFaceScene(detected, landmarks) {
  var c = document.getElementById('face-canvas'); if (!c) return;
  var ctx = c.getContext('2d'); ctx.clearRect(0,0,320,240);
  ctx.fillStyle = '#1e1a2a'; ctx.fillRect(0,0,320,240);
  ctx.fillStyle = '#2a2040'; ctx.fillRect(0,180,320,60);
  ctx.fillStyle = '#352d50'; ctx.fillRect(0,200,320,40);
  var bodyColors = ['#5a4070','#403060','#4a3565'];
  for (var i = 0; i < facePeople.length; i++) {
    var p = facePeople[i];
    ctx.fillStyle = bodyColors[i];
    ctx.beginPath(); ctx.arc(p.x + p.w/2, p.y + p.h + 30, p.w * 0.45, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#c49060';
    ctx.beginPath(); ctx.arc(p.x + p.w/2, p.y + p.h/2, p.w * 0.38, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#2a1a0a';
    ctx.beginPath(); ctx.arc(p.x + p.w/2, p.y + p.h*0.2, p.w * 0.40, 0, Math.PI); ctx.fill();
    if (detected) {
      ctx.strokeStyle = '#48bb78'; ctx.lineWidth = 2; ctx.setLineDash([]);
      ctx.strokeRect(p.x, p.y, p.w, p.h);
      ctx.font = 'bold 10px Segoe UI'; ctx.textAlign = 'left';
      var lw = ctx.measureText(p.label + ' ' + (p.conf*100).toFixed(0) + '%').width;
      ctx.fillStyle = '#48bb78'; ctx.fillRect(p.x, p.y-16, lw+8, 16);
      ctx.fillStyle = '#0a0a16'; ctx.fillText(p.label + ' ' + (p.conf*100).toFixed(0) + '%', p.x+4, p.y-4);
      if (landmarks && showFaceLandmarks) {
        var lmNames = Object.keys(p.landmarks);
        var lmColors = {left_eye:'#4299e1', right_eye:'#4299e1', nose:'#f6ad55', left_mouth:'#fc8181', right_mouth:'#fc8181'};
        for (var j = 0; j < lmNames.length; j++) {
          var pt = p.landmarks[lmNames[j]];
          ctx.beginPath(); ctx.arc(pt[0], pt[1], 3, 0, Math.PI*2);
          ctx.fillStyle = lmColors[lmNames[j]] || '#fff'; ctx.fill();
        }
        ctx.strokeStyle = '#4299e1'; ctx.lineWidth = 1;
        var le = p.landmarks.left_eye, re = p.landmarks.right_eye;
        ctx.beginPath(); ctx.moveTo(le[0], le[1]); ctx.lineTo(re[0], re[1]); ctx.stroke();
        ctx.strokeStyle = '#f6ad55';
        var ns = p.landmarks.nose, lm = p.landmarks.left_mouth, rm = p.landmarks.right_mouth;
        ctx.beginPath(); ctx.moveTo(lm[0], lm[1]); ctx.lineTo(ns[0], ns[1]); ctx.lineTo(rm[0], rm[1]); ctx.stroke();
      }
    }
  }
  ctx.fillStyle = '#4a5568'; ctx.font = '9px Segoe UI'; ctx.textAlign = 'center';
  ctx.fillText(detected ? (landmarks && showFaceLandmarks ? '3 faces + 5 landmarks each' : '3 faces detected') : 'Raw camera frame — no detection yet', 160, 232);
}
function runFaceDetection() {
  faceDetected = true; showFaceLandmarks = true;
  drawFaceScene(true, true);
  var out = '';
  for (var i = 0; i < facePeople.length; i++) {
    var p = facePeople[i];
    out += 'Face ' + (i+1) + ': conf=' + p.conf + '\n';
    out += '  bbox=[' + p.x + ',' + p.y + ',' + (p.x+p.w) + ',' + (p.y+p.h) + ']\n';
    out += '  eyes=(' + p.landmarks.left_eye + '),(' + p.landmarks.right_eye + ')\n';
    out += '  nose=(' + p.landmarks.nose + ')\n';
    if (i < facePeople.length-1) out += '\n';
  }
  document.getElementById('face-output').textContent = out;
}
function toggleLandmarks() {
  if (!faceDetected) { runFaceDetection(); return; }
  showFaceLandmarks = !showFaceLandmarks;
  drawFaceScene(true, showFaceLandmarks);

function resetFaceCanvas() { faceDetected = false; showFaceLandmarks = false; drawFaceScene(false, false); document.getElementById('face-output').textContent = 'Click Detect Faces...'; }

function handleEmotionClick(e) {

  var my = (e.clientY - r.top) * (c.height / r.height);

// ── MASK R-CNN ANIMATION ──────────────────────────────────────────────────────
var maskRCNNStep = 0;
var maskRCNNTimer = null;

function resetMaskRCNN() {
  if (maskRCNNTimer) clearInterval(maskRCNNTimer);
  maskRCNNStep = 0; drawMaskRCNNStage(0);
  document.getElementById('maskrcnn-info').textContent = 'Click Run Pipeline to see the Mask R-CNN stages';
}

function animateMaskRCNN() {
  if (maskRCNNTimer) clearInterval(maskRCNNTimer);
  maskRCNNStep = 0;
  maskRCNNTimer = setInterval(function() {
    maskRCNNStep++;
    if (maskRCNNStep > 5) { clearInterval(maskRCNNTimer); return; }
    drawMaskRCNNStage(maskRCNNStep);
  }, 1000);
  drawMaskRCNNStage(0);
}

function drawMaskRCNNStage(step) {
  var c = document.getElementById('maskrcnn-canvas'); if (!c) return;
  var ctx = c.getContext('2d'); ctx.clearRect(0,0,500,180);
  var stages = [
    {label:'Input\nImage',   color:'#4299e1', desc:'Raw image fed to backbone CNN (ResNet)'},
    {label:'Backbone\n(ResNet)',color:'#9f7aea', desc:'Extract deep feature maps from image'},
    {label:'Region\nProposal',color:'#ed8936', desc:'RPN proposes ~300 candidate regions (RoIs)'},
    {label:'RoI\nAlign',    color:'#e53e3e', desc:'Crop + resize features for each proposal'},
    {label:'Box\nHead',     color:'#48bb78', desc:'Classify object + refine bounding box'},
    {label:'Mask\nHead',    color:'#f6ad55', desc:'Predict 28×28 binary mask per detected object'}
  ];
  var n = stages.length, bw = 72, bh = 60, gap = 10;
  var totalW = n*bw + (n-1)*gap, startX = (500 - totalW) / 2;
  for (var i = 0; i < n; i++) {
    var s = stages[i];
    var x = startX + i*(bw+gap), y = 55;
    var active = (i <= step);
    ctx.fillStyle = active ? s.color + '33' : '#1a1a2e';
    ctx.strokeStyle = active ? s.color : '#2d3748';
    ctx.lineWidth = active ? 2 : 1;
    ctx.beginPath(); ctx.roundRect(x, y, bw, bh, 5); ctx.fill(); ctx.stroke();
    ctx.fillStyle = active ? s.color : '#4a5568';
    ctx.font = 'bold 9px Segoe UI'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    var lines = s.label.split('\n');
    for (var j = 0; j < lines.length; j++) ctx.fillText(lines[j], x+bw/2, y+bh/2+(j-0.5)*12);
    if (i < n-1) {
      ctx.strokeStyle = active ? '#4a5568' : '#2d3748'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x+bw+2, y+bh/2); ctx.lineTo(x+bw+gap-2, y+bh/2); ctx.stroke();
      if (active) {
        ctx.fillStyle = '#4a5568'; ctx.beginPath();
        ctx.moveTo(x+bw+gap-2, y+bh/2-4); ctx.lineTo(x+bw+gap+3, y+bh/2); ctx.lineTo(x+bw+gap-2, y+bh/2+4);
        ctx.fill();
      }
    }
    if (i <= step) {
      ctx.fillStyle = s.color; ctx.font = 'bold 9px Segoe UI'; ctx.textAlign='center';
      ctx.fillText('✓', x+bw/2, y-10);
    }
  }
  var descriptions = ['Feeding image...', 'ResNet extracting features...', 'RPN proposing regions of interest...', 'Aligning features for each RoI...', 'Classifying & localizing objects...', '✅ Masks predicted for each object!'];
  var infos = document.getElementById('maskrcnn-info'); if (infos) infos.textContent = step < descriptions.length ? descriptions[step] : '';
}

// ── QUIZ ENGINE ───────────────────────────────────────────────────────────────
function renderQuiz(questions, containerId) {
  var el = document.getElementById(containerId);
  var idx = 0, score = 0, answered = false;
  function render() {
    if (idx >= questions.length) {
      var icon = score === questions.length ? '🏆' : score >= questions.length/2 ? '🎉' : '📚';
      var msg = score === questions.length ? 'Perfect! Interview-ready 💪' : 'Keep revising — you got this!';
      el.innerHTML = '<div class="quiz-score"><div style="font-size:48px;margin-bottom:8px">' + icon + '</div>' +
        '<div style="font-size:20px;font-weight:700">' + score + '/' + questions.length + '</div>' +
        '<div style="color:#718096;font-size:13px;margin-top:6px">' + msg + '</div>' +
        '<button class="quiz-next" style="margin-top:12px" id="retry-btn">Try Again</button></div>';
      document.getElementById('retry-btn').onclick = function() { idx = 0; score = 0; answered = false; render(); };
      return;
    }
    var q = questions[idx];
    var html = '<div style="font-size:11px;color:#718096;margin-bottom:8px">Q' + (idx+1) + '/' + questions.length + '  •  Score: ' + score + '</div>';
    html += '<div class="quiz-q">' + q.q + '</div>';
    for (var oi = 0; oi < q.opts.length; oi++) {
      html += '<button class="quiz-opt" data-i="' + oi + '">' + String.fromCharCode(65+oi) + '. ' + q.opts[oi] + '</button>';
    }
    html += '<div id="q-exp" style="display:none" class="quiz-exp">' + q.exp + '</div>';
    html += '<div id="q-next" style="display:none"><button class="quiz-next">' + (idx < questions.length-1 ? 'Next Question →' : 'See Results') + '</button></div>';
    el.innerHTML = html;
    answered = false;
    var opts = el.querySelectorAll('.quiz-opt');
    for (var oi2 = 0; oi2 < opts.length; oi2++) {
      (function(btn) {
        btn.addEventListener('click', function() {
          if (answered) return; answered = true;
          var chosen = +btn.getAttribute('data-i');
          if (chosen === q.c) { btn.classList.add('correct'); score++; }
          else { btn.classList.add('wrong'); opts[q.c].classList.add('correct'); }
          for (var di = 0; di < opts.length; di++) opts[di].disabled = true;
          document.getElementById('q-exp').style.display = 'block';
          document.getElementById('q-next').style.display = 'block';
          document.getElementById('q-next').querySelector('button').onclick = function() { idx++; render(); };
        });
      })(opts[oi2]);
    }
  }
  render();
}

var SYS = 'You are a Computer Vision interview tutor for beginners. Be concise (3-5 sentences), clear, encouraging. Use **bold** for key terms. Bullet points when listing. Give model interview answers when asked.';

function addMsg(boxId, content, role) {
  var box = document.getElementById(boxId);
  if (!box) return null;
  var d = document.createElement('div');
  d.className = 'msg ' + role;
  d.innerHTML = content;
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
  return d;
}
function renderMd(t) {
  return t.replace(/\*\*(.*?)\*\*/g,'<b>$1</b>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/^[-•] (.+)$/gm,'<li style="margin-left:12px">$1</li>').replace(/\n/g,'<br/>');
}
function showTyping(boxId) {
  var box = document.getElementById(boxId);
  if (!box) return null;
  var d = document.createElement('div');
  d.className = 'typing-dots';
  d.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
  return d;
}
async function callAPI(msgs, context) {
  var res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,system:SYS+(context?'\nContext: '+context:''),messages:msgs})
  });
  var d = await res.json();
  return d.content ? d.content.map(function(b){return b.text||'';}).join('') : 'Sorry, try again.';
}

async function globalSend(msg) {
  var inp = document.getElementById('chat-input');
  var text = msg || inp.value.trim();
  if (!text) return;
  inp.value = '';
  addMsg('chat-box', text, 'user');
  var typing = showTyping('chat-box');
  globalMsgs.push({role:'user',content:text});
  try {
    var reply = await callAPI(globalMsgs, '');
    globalMsgs.push({role:'assistant',content:reply});
    if (typing) typing.outerHTML = '';
    addMsg('chat-box', renderMd(reply), 'ai');
  } catch(err) {
    if (typing) typing.outerHTML = '';
    addMsg('chat-box', 'Error — check your connection.', 'ai');
  }
}

function secSendText(q) { secSend(q); switchTab(2); }

async function secSend(msg) {
  var inp = document.getElementById('sec-chat-input');
  var text = msg || inp.value.trim();
  if (!text) return;
  inp.value = '';
  if (!secMsgs[currentSection.id]) secMsgs[currentSection.id] = [];
  var msgs = secMsgs[currentSection.id];
  addMsg('sec-chat-box', text, 'user');
  var typing = showTyping('sec-chat-box');
  msgs.push({role:'user',content:text});
  var ctx = 'Currently studying: "' + currentSection.title + '". ' + currentSection.desc;
  try {
    var reply = await callAPI(msgs, ctx);
    msgs.push({role:'assistant',content:reply});
    if (typing) typing.outerHTML = '';
    addMsg('sec-chat-box', renderMd(reply), 'ai');
  } catch(err) {
    if (typing) typing.outerHTML = '';
    addMsg('sec-chat-box', 'Error — check connection.', 'ai');
  }
}

document.getElementById('sec-chat-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') secSend();
});
